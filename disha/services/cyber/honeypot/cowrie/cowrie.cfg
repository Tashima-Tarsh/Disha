# =============================================================================
# Cowrie SSH Honeypot Configuration
# Disha Virtual Cyber Defense System
# =============================================================================

[honeypot]
hostname = svr04
listen_endpoints = tcp:2222:interface=0.0.0.0
download_path = ${honeypot:state_path}/downloads
share_path = /cowrie/share/cowrie
contents_path = /cowrie/honeyfs
txtcmds_path = /cowrie/txtcmds
log_path = /cowrie/log
state_path = /cowrie/state
interact_enabled = false

[output_jsonlog]
enabled = true
class = cowrie.output.jsonlog.Output
logfile = /cowrie/log/cowrie.json

[shell]
filesystem = /cowrie/share/cowrie/fs.pickle

[ssh]
enabled = true
version = SSH-2.0-OpenSSH_6.0p1 Debian-4+deb7u2
listen_endpoints = tcp:2222:interface=0.0.0.0
