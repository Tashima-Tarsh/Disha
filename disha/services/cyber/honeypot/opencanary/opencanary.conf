{
    "device.node_id": "disha-opencanary-1",

    "ftp.enabled": true,
    "ftp.port": 21,
    "ftp.banner": "FTP server ready",

    "git.enabled": true,
    "git.port": 9418,

    "http.enabled": true,
    "http.port": 8080,
    "http.banner": "Apache/2.2.22 (Ubuntu)",
    "http.skin": "nasty",

    "httpproxy.enabled": false,

    "mysql.enabled": false,

    "redis.enabled": true,
    "redis.port": 6379,

    "snmp.enabled": false,
    "ssh.enabled": false,
    "telnet.enabled": false,

    "logger": {
        "class": "PyLogger",
        "kwargs": {
            "formatters": {
                "plain": {
                    "format": "%(message)s"
                }
            },
            "handlers": {
                "file": {
                    "class": "logging.FileHandler",
                    "filename": "/var/log/opencanary/opencanary.log",
                    "formatter": "plain"
                }
            }
        }
    }
}
