# =============================================================================
# Dionaea Multi-Protocol Honeypot Configuration
# Disha Virtual Cyber Defense System
# =============================================================================

[dionaea]
download.dir=/dionaea/log/binaries
bistreams.dir=/dionaea/log/bistreams
listen.mode=getifaddrs

[logging]
default.filename=/dionaea/log/dionaea.log
default.levels=all
default.domains=*

[module.json]
logfile=/dionaea/log/dionaea.json

[module.python]
imports=dionaea.log,dionaea.services.http,dionaea.services.mysql,dionaea.services.smb

[services.http]
root=/dionaea/var/lib/dionaea/www

[services.mysql]
root=/dionaea/var/lib/dionaea/mysql

[services.smb]
root=/dionaea/var/lib/dionaea/smb
