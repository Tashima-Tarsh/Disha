services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tashu
      POSTGRES_PASSWORD: tashu_secret
      POSTGRES_DB: tashu_auditor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tashu -d tashu_auditor"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://tashu:tashu_secret@postgres:5432/tashu_auditor?sslmode=disable
      JWT_SECRET: change-me-in-production-use-a-long-random-secret!!
      PORT: "8080"
      AI_PROVIDER: noop
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/graphql
    depends_on:
      - backend

volumes:
  postgres_data:
