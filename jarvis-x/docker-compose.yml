services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env.example
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  agent:
    build:
      context: ./agent
    env_file:
      - .env.example
    environment:
      JARVIS_X_BACKEND_URL: http://backend:8080
    depends_on:
      - backend
    restart: unless-stopped
