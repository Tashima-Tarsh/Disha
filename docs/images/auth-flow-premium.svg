<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#172036"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M2 2L10 6L2 10V2Z" fill="#38BDF8"/>
    </marker>
    <style>
      .title { font: 700 34px 'Inter', 'Segoe UI', sans-serif; fill: #F8FAFC; }
      .subtitle { font: 500 16px 'Inter', 'Segoe UI', sans-serif; fill: #94A3B8; }
      .section { font: 600 14px 'Inter', 'Segoe UI', sans-serif; fill: #CBD5E1; letter-spacing: 0.12em; }
      .cardTitle { font: 700 20px 'Inter', 'Segoe UI', sans-serif; fill: #F8FAFC; }
      .cardText { font: 500 14px 'Inter', 'Segoe UI', sans-serif; fill: #CBD5E1; }
      .mini { font: 700 12px 'Inter', 'Segoe UI', sans-serif; fill: #E2E8F0; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="1600" height="900" rx="28" fill="#0F172A"/>
  <text x="96" y="110" class="title">Authentication Flow</text>
  <text x="96" y="140" class="subtitle">Session creation, token rotation, validation, and protected access through the web security boundary</text>

  <rect x="96" y="190" width="1408" height="610" rx="30" fill="url(#panel)" stroke="#24324A"/>
  <text x="128" y="232" class="section">LOGIN TO ACCESS PIPELINE</text>

  <rect x="130" y="300" width="220" height="160" rx="26" fill="#111C33" stroke="#334155" filter="url(#shadow)"/>
  <circle cx="185" cy="360" r="24" fill="#4F46E5"/>
  <text x="169" y="365" class="mini">USR</text>
  <text x="226" y="348" class="cardTitle">User Login</text>
  <text x="226" y="372" class="cardText">Credential submission</text>
  <text x="226" y="395" class="cardText">Browser initiates session</text>

  <rect x="404" y="300" width="250" height="160" rx="26" fill="#111C33" stroke="#334155" filter="url(#shadow)"/>
  <circle cx="460" cy="360" r="24" fill="#38BDF8"/>
  <text x="444" y="365" class="mini">API</text>
  <text x="501" y="348" class="cardTitle">Auth Route</text>
  <text x="501" y="372" class="cardText">`/api/auth/login`</text>
  <text x="501" y="395" class="cardText">Policy and credential verification</text>

  <rect x="708" y="300" width="250" height="160" rx="26" fill="#111C33" stroke="#334155" filter="url(#shadow)"/>
  <circle cx="764" cy="360" r="24" fill="#22C55E"/>
  <text x="744" y="365" class="mini">DB</text>
  <text x="804" y="348" class="cardTitle">Session Store</text>
  <text x="804" y="372" class="cardText">Refresh token metadata</text>
  <text x="804" y="395" class="cardText">Revocation and rotation state</text>

  <rect x="1012" y="300" width="250" height="160" rx="26" fill="#111C33" stroke="#334155" filter="url(#shadow)"/>
  <circle cx="1068" cy="360" r="24" fill="#4F46E5"/>
  <text x="1048" y="365" class="mini">TOK</text>
  <text x="1107" y="348" class="cardTitle">Token Issuance</text>
  <text x="1107" y="372" class="cardText">Access token plus secure cookies</text>
  <text x="1107" y="395" class="cardText">Strict browser session semantics</text>

  <rect x="1296" y="300" width="176" height="160" rx="26" fill="#111C33" stroke="#334155" filter="url(#shadow)"/>
  <circle cx="1352" cy="360" r="24" fill="#38BDF8"/>
  <text x="1334" y="365" class="mini">ACC</text>
  <text x="1388" y="348" class="cardTitle">Access</text>
  <text x="1388" y="372" class="cardText">Protected request</text>
  <text x="1388" y="395" class="cardText">Authorized response</text>

  <path d="M350 380H392" stroke="#38BDF8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M654 380H696" stroke="#38BDF8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M958 380H1000" stroke="#38BDF8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1262 380H1284" stroke="#38BDF8" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="330" y="560" width="940" height="146" rx="28" fill="#111C33" stroke="#334155" filter="url(#shadow)"/>
  <text x="370" y="610" class="cardTitle">Refresh and Validation Loop</text>
  <text x="370" y="638" class="cardText">When the browser calls `POST /api/auth/refresh`, the server validates the existing session, rotates the refresh token, persists the new token metadata, and returns a renewed access state.</text>
  <text x="370" y="668" class="cardText">Every protected route re-validates identity and action scope before data access is allowed.</text>

  <path d="M1384 460V520H1137V548" stroke="#38BDF8" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="96" y="820" width="1408" height="26" rx="13" fill="#111827"/>
  <text x="118" y="838" class="subtitle">Key rule: login creates session state, refresh rotates it, and every protected route validates scope before access</text>
</svg>
