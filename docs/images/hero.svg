<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="420" viewBox="0 0 1600 420">
  <defs>
    <linearGradient id="g0" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4F46E5" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="g1" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22C55E" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#4F46E5" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1600" height="420" fill="#0F172A"/>

  <!-- Soft shapes -->
  <g filter="url(#blur)">
    <circle cx="1220" cy="70" r="170" fill="url(#g0)"/>
    <circle cx="1460" cy="250" r="210" fill="url(#g1)"/>
    <circle cx="220" cy="300" r="210" fill="url(#g0)" opacity="0.35"/>
  </g>

  <!-- Frame line -->
  <rect x="28" y="28" width="1544" height="364" rx="18" fill="none" stroke="#334155" stroke-width="2" opacity="0.9"/>

  <!-- Title -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" fill="#E5E7EB">
    <text x="86" y="168" font-size="54" font-weight="700" letter-spacing="0">DISHA Brain</text>
    <text x="86" y="214" font-size="18" font-weight="500" fill="#CBD5E1">
      Secure, observable AI execution platform (Web + CLI + Brain + Edge Agent)
    </text>
    <text x="86" y="258" font-size="14" font-weight="500" fill="#94A3B8">
      Zero trust • Policy-based execution • Auditable decisions • Graceful degradation
    </text>
  </g>

  <!-- Badges -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-size="12" font-weight="600">
    <g transform="translate(86 300)">
      <rect width="132" height="30" rx="10" fill="#111827" stroke="#1F2937"/>
      <circle cx="16" cy="15" r="6" fill="#22C55E"/>
      <text x="30" y="19" fill="#E5E7EB">Health Checks</text>
    </g>
    <g transform="translate(230 300)">
      <rect width="132" height="30" rx="10" fill="#111827" stroke="#1F2937"/>
      <circle cx="16" cy="15" r="6" fill="#4F46E5"/>
      <text x="30" y="19" fill="#E5E7EB">Audit Logs</text>
    </g>
    <g transform="translate(374 300)">
      <rect width="158" height="30" rx="10" fill="#111827" stroke="#1F2937"/>
      <circle cx="16" cy="15" r="6" fill="#38BDF8"/>
      <text x="30" y="19" fill="#E5E7EB">Timeout Boundaries</text>
    </g>
  </g>
</svg>

