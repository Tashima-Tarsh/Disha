<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#667eea" flood-opacity="0.3"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="16"/>
  
  <!-- Decorative grid -->
  <g opacity="0.05" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
  </g>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="40" fill="none" stroke="#667eea" stroke-width="1" opacity="0.15"/>
  <circle cx="1100" cy="220" r="60" fill="none" stroke="#764ba2" stroke-width="1" opacity="0.15"/>
  <circle cx="950" cy="60" r="25" fill="none" stroke="#00d2ff" stroke-width="1" opacity="0.1"/>
  
  <!-- Shield icon -->
  <g transform="translate(180, 85)" filter="url(#glow-filter)">
    <path d="M60 0 L120 30 L120 75 C120 115 90 140 60 150 C30 140 0 115 0 75 L0 30 Z" 
          fill="url(#accent)" opacity="0.9"/>
    <path d="M60 15 L108 40 L108 75 C108 107 84 128 60 136 C36 128 12 107 12 75 L12 40 Z" 
          fill="url(#bg)" opacity="0.8"/>
    <text x="60" y="95" text-anchor="middle" fill="url(#glow)" font-size="50" font-weight="bold" font-family="Arial, sans-serif">🛡️</text>
  </g>
  
  <!-- Title -->
  <text x="360" y="120" font-family="'Segoe UI', Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff" filter="url(#shadow)">DISHA</text>
  
  <!-- Sanskrit -->
  <text x="360" y="158" font-family="'Segoe UI', Arial, sans-serif" font-size="22" fill="#a78bfa" font-style="italic">दिशा — "Direction" in Sanskrit</text>
  
  <!-- Subtitle -->
  <text x="360" y="195" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#94a3b8">Self-Learning Multi-Agent AGI Platform</text>
  
  <!-- Tagline pills -->
  <g transform="translate(360, 215)">
    <rect x="0" y="0" width="90" height="26" rx="13" fill="#667eea" opacity="0.3"/>
    <text x="45" y="17" text-anchor="middle" fill="#a5b4fc" font-size="11" font-family="Arial, sans-serif">7 Agents</text>
    
    <rect x="100" y="0" width="90" height="26" rx="13" fill="#764ba2" opacity="0.3"/>
    <text x="145" y="17" text-anchor="middle" fill="#c4b5fd" font-size="11" font-family="Arial, sans-serif">40+ Tools</text>
    
    <rect x="200" y="0" width="110" height="26" rx="13" fill="#3a7bd5" opacity="0.3"/>
    <text x="255" y="17" text-anchor="middle" fill="#93c5fd" font-size="11" font-family="Arial, sans-serif">PPO RL Engine</text>
    
    <rect x="320" y="0" width="100" height="26" rx="13" fill="#00d2ff" opacity="0.2"/>
    <text x="370" y="17" text-anchor="middle" fill="#67e8f9" font-size="11" font-family="Arial, sans-serif">Multimodal</text>
    
    <rect x="430" y="0" width="120" height="26" rx="13" fill="#667eea" opacity="0.3"/>
    <text x="490" y="17" text-anchor="middle" fill="#a5b4fc" font-size="11" font-family="Arial, sans-serif">100% Open Source</text>
  </g>
  
  <!-- Bottom accent line -->
  <rect x="0" y="292" width="1200" height="8" fill="url(#accent)" rx="0"/>
</svg>
