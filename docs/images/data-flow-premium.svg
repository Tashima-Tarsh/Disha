<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lane" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#172036"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M2 2L10 6L2 10V2Z" fill="#38BDF8"/>
    </marker>
    <style>
      .title { font: 700 34px 'Inter', 'Segoe UI', sans-serif; fill: #F8FAFC; }
      .subtitle { font: 500 16px 'Inter', 'Segoe UI', sans-serif; fill: #94A3B8; }
      .laneTitle { font: 600 14px 'Inter', 'Segoe UI', sans-serif; fill: #CBD5E1; letter-spacing: 0.12em; }
      .cardTitle { font: 700 19px 'Inter', 'Segoe UI', sans-serif; fill: #F8FAFC; }
      .cardText { font: 500 14px 'Inter', 'Segoe UI', sans-serif; fill: #CBD5E1; }
      .mini { font: 700 12px 'Inter', 'Segoe UI', sans-serif; fill: #E2E8F0; letter-spacing: 0.08em; }
    </style>
  </defs>

  <rect width="1600" height="900" rx="28" fill="#0F172A"/>
  <text x="96" y="110" class="title">Data Flow</text>
  <text x="96" y="140" class="subtitle">Validated request pipeline from user input to typed response and audit trail</text>

  <rect x="90" y="190" width="1420" height="570" rx="30" fill="url(#lane)" stroke="#24324A"/>
  <text x="124" y="230" class="laneTitle">REQUEST LIFECYCLE</text>

  <rect x="130" y="300" width="170" height="220" rx="28" fill="#111C33" stroke="#334155" filter="url(#shadow)"/>
  <circle cx="215" cy="360" r="28" fill="#4F46E5"/>
  <text x="199" y="365" class="mini">REQ</text>
  <text x="170" y="418" class="cardTitle">Request</text>
  <text x="154" y="445" class="cardText">Browser or client payload</text>
  <text x="154" y="468" class="cardText">Headers, body, identity</text>

  <rect x="355" y="300" width="190" height="220" rx="28" fill="#111C33" stroke="#334155" filter="url(#shadow)"/>
  <circle cx="450" cy="360" r="28" fill="#38BDF8"/>
  <text x="433" y="365" class="mini">VAL</text>
  <text x="390" y="418" class="cardTitle">Validation</text>
  <text x="380" y="445" class="cardText">Schema parsing</text>
  <text x="380" y="468" class="cardText">Size and shape checks</text>

  <rect x="600" y="300" width="190" height="220" rx="28" fill="#111C33" stroke="#334155" filter="url(#shadow)"/>
  <circle cx="695" cy="360" r="28" fill="#22C55E"/>
  <text x="677" y="365" class="mini">POL</text>
  <text x="651" y="418" class="cardTitle">Policy</text>
  <text x="633" y="445" class="cardText">Principal resolution</text>
  <text x="633" y="468" class="cardText">RBAC and request guards</text>

  <rect x="845" y="300" width="200" height="220" rx="28" fill="#111C33" stroke="#334155" filter="url(#shadow)"/>
  <circle cx="945" cy="360" r="28" fill="#4F46E5"/>
  <text x="927" y="365" class="mini">SVC</text>
  <text x="895" y="418" class="cardTitle">Processing</text>
  <text x="875" y="445" class="cardText">Service orchestration</text>
  <text x="875" y="468" class="cardText">Business workflow execution</text>

  <rect x="1100" y="300" width="180" height="220" rx="28" fill="#111C33" stroke="#334155" filter="url(#shadow)"/>
  <circle cx="1190" cy="360" r="28" fill="#38BDF8"/>
  <text x="1170" y="365" class="mini">IO</text>
  <text x="1148" y="418" class="cardTitle">Data Access</text>
  <text x="1133" y="445" class="cardText">Postgres, Redis, AI backends</text>
  <text x="1133" y="468" class="cardText">Read or write state</text>

  <rect x="1335" y="300" width="135" height="220" rx="28" fill="#111C33" stroke="#334155" filter="url(#shadow)"/>
  <circle cx="1402" cy="360" r="28" fill="#22C55E"/>
  <text x="1386" y="365" class="mini">RES</text>
  <text x="1360" y="418" class="cardTitle">Response</text>
  <text x="1353" y="445" class="cardText">Typed output</text>
  <text x="1353" y="468" class="cardText">Stable error shape</text>

  <path d="M300 410H343" stroke="#38BDF8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M545 410H588" stroke="#38BDF8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M790 410H833" stroke="#38BDF8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1045 410H1088" stroke="#38BDF8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1280 410H1323" stroke="#38BDF8" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="430" y="585" width="740" height="110" rx="28" fill="#111C33" stroke="#334155" filter="url(#shadow)"/>
  <circle cx="485" cy="640" r="22" fill="#4F46E5"/>
  <text x="469" y="645" class="mini">AUD</text>
  <text x="525" y="628" class="cardTitle">Audit and Observability</text>
  <text x="525" y="653" class="cardText">Auth events, file actions, export/share workflows, and AI decisions are emitted as audit records with request context.</text>

  <path d="M945 520V570" stroke="#38BDF8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M945 570H815C760 570 760 585 760 585" stroke="#38BDF8" stroke-width="4"/>

  <rect x="90" y="790" width="1420" height="34" rx="17" fill="#111827"/>
  <text x="118" y="812" class="subtitle">Pipeline order: Request -> Validation -> Policy -> Processing -> Data Access -> Response, with audit capture on protected operations</text>
</svg>
