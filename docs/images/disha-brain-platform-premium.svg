<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <!-- Palette (light matte / cream) -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFBF5"/>
      <stop offset="60%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#FFF7ED"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="200%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <filter id="hardShadow" x="-30%" y="-30%" width="160%" height="220%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>

    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M2 2L10 6L2 10V2Z" fill="#0EA5E9"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M2 2L10 6L2 10V2Z" fill="#22C55E"/>
    </marker>

    <style>
      .h1 { font: 800 38px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #0F172A; }
      .h2 { font: 650 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #334155; }
      .section { font: 800 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #475569; letter-spacing: 0.16em; }
      .title { font: 800 18px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #0F172A; }
      .text { font: 550 13px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #334155; }
      .mono { font: 650 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; fill: #475569; }

      .frame { stroke: #E2E8F0; stroke-width: 2; }
      .stroke { stroke: #CBD5E1; stroke-width: 1.5; }
      .stroke2 { stroke: #94A3B8; stroke-width: 1.5; }

      .flow { stroke: #0EA5E9; stroke-width: 3.5; fill: none; marker-end: url(#arrow); opacity: 0.95; }
      .flow2 { stroke: #22C55E; stroke-width: 3.5; fill: none; marker-end: url(#arrowGreen); opacity: 0.95; }
      .flow3 { stroke: #4F46E5; stroke-width: 3.5; fill: none; marker-end: url(#arrow); opacity: 0.85; }

      .chip { fill: #FFFFFF; stroke: #E2E8F0; stroke-width: 1.5; }
      .chipText { font: 800 11px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #0F172A; letter-spacing: 0.10em; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" rx="28" fill="url(#bg)"/>
  <rect x="54" y="54" width="1812" height="972" rx="28" fill="none" class="frame"/>

  <!-- Header -->
  <text x="96" y="126" class="h1">DISHA Brain Platform</text>
  <text x="96" y="156" class="h2">Center control-plane architecture with policy gating, audit trails, module adapters, and deception telemetry (honeypots)</text>

  <!-- Icon system (inline, consistent) -->
  <!-- Browser icon -->
  <g id="ico_browser">
    <rect x="0" y="0" width="26" height="20" rx="5" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
    <rect x="0" y="0" width="26" height="6" rx="5" fill="#E0E7FF"/>
    <circle cx="6" cy="3" r="1.2" fill="#4F46E5"/>
    <circle cx="10" cy="3" r="1.2" fill="#38BDF8"/>
    <circle cx="14" cy="3" r="1.2" fill="#22C55E"/>
  </g>
  <!-- Terminal icon -->
  <g id="ico_terminal">
    <rect x="0" y="0" width="26" height="20" rx="5" fill="#ECFEFF" stroke="#0EA5E9" stroke-width="1.5"/>
    <path d="M7 7L11 10L7 13" fill="none" stroke="#0EA5E9" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M12.5 13H18.5" fill="none" stroke="#0EA5E9" stroke-width="1.6" stroke-linecap="round"/>
  </g>
  <!-- Shield icon -->
  <g id="ico_shield">
    <path d="M13 1.5L22 5.2V11.5C22 16.4 18.4 20.8 13 22.5C7.6 20.8 4 16.4 4 11.5V5.2L13 1.5Z" fill="#ECFDF5" stroke="#22C55E" stroke-width="1.5"/>
    <path d="M8.2 12.0L11.2 15.0L17.6 8.7" fill="none" stroke="#22C55E" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- DB cylinder icon -->
  <g id="ico_db">
    <ellipse cx="13" cy="5.3" rx="9" ry="3.6" fill="#EFF6FF" stroke="#38BDF8" stroke-width="1.5"/>
    <path d="M4 5.3V16.8C4 18.8 8 20.4 13 20.4C18 20.4 22 18.8 22 16.8V5.3" fill="#EFF6FF" stroke="#38BDF8" stroke-width="1.5"/>
    <path d="M4 10.0C4 12.0 8 13.6 13 13.6C18 13.6 22 12.0 22 10.0" fill="none" stroke="#38BDF8" stroke-width="1.5"/>
  </g>
  <!-- Honeypot icon -->
  <g id="ico_honey">
    <path d="M7 9C7 6.8 8.7 5 11 5H15C17.3 5 19 6.8 19 9V18C19 20 17.4 21.5 15.4 21.5H10.6C8.6 21.5 7 20 7 18V9Z" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
    <path d="M9 5C9 3.6 10.1 2.5 11.5 2.5H14.5C15.9 2.5 17 3.6 17 5" fill="none" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M10.2 12.2C11.4 11.1 12.7 11.1 13.8 12.2C15 13.3 16.2 13.3 17.4 12.2" fill="none" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Left column: Experience -->
  <rect x="96" y="210" width="410" height="770" rx="26" fill="url(#panel)" class="stroke" filter="url(#softShadow)"/>
  <rect x="96" y="210" width="410" height="7" rx="3.5" fill="url(#accent)"/>
  <text x="128" y="252" class="section">EXPERIENCE</text>

  <!-- Web -->
  <rect x="128" y="290" width="346" height="120" rx="20" fill="#FFFFFF" class="stroke" filter="url(#softShadow)"/>
  <use href="#ico_browser" x="156" y="332"/>
  <text x="196" y="334" class="title">Web Console</text>
  <text x="196" y="358" class="text">Operator workflows, RBAC, audit views</text>
  <text x="196" y="382" class="mono">web/</text>

  <!-- CLI -->
  <rect x="128" y="430" width="346" height="120" rx="20" fill="#FFFFFF" class="stroke" filter="url(#softShadow)"/>
  <use href="#ico_terminal" x="156" y="472"/>
  <text x="196" y="474" class="title">CLI Runtime</text>
  <text x="196" y="498" class="text">Secure tool execution + storage policy</text>
  <text x="196" y="522" class="mono">src/</text>

  <!-- Edge agent -->
  <rect x="128" y="570" width="346" height="120" rx="20" fill="#FFFFFF" class="stroke" filter="url(#softShadow)"/>
  <circle cx="169" cy="631" r="13" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="1.5"/>
  <path d="M169 622V640" stroke="#0EA5E9" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M160 631H178" stroke="#0EA5E9" stroke-width="1.6" stroke-linecap="round"/>
  <text x="196" y="614" class="title">Edge Agent</text>
  <text x="196" y="638" class="text">Telemetry, device signals, event forwarding</text>
  <text x="196" y="662" class="mono">disha/edge_agent/</text>

  <!-- Mobile -->
  <rect x="128" y="710" width="346" height="120" rx="20" fill="#FFFFFF" class="stroke" filter="url(#softShadow)"/>
  <rect x="156" y="744" width="26" height="44" rx="7" fill="#F1F5F9" stroke="#64748B" stroke-width="1.5"/>
  <circle cx="169" cy="782" r="1.8" fill="#64748B"/>
  <text x="196" y="754" class="title">Mobile Companion</text>
  <text x="196" y="778" class="text">Chat, alerts, settings scaffold</text>
  <text x="196" y="802" class="mono">disha/mobile/</text>

  <!-- Center: Control plane -->
  <rect x="544" y="210" width="832" height="770" rx="26" fill="url(#panel)" class="stroke" filter="url(#hardShadow)"/>
  <rect x="544" y="210" width="832" height="7" rx="3.5" fill="url(#accent)"/>
  <text x="576" y="252" class="section">CONTROL PLANE</text>

  <!-- Brain core -->
  <rect x="592" y="290" width="736" height="210" rx="22" fill="#FFFFFF" class="stroke" filter="url(#hardShadow)"/>
  <circle cx="646" cy="372" r="28" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2"/>
  <path d="M633 374C633 365 640 358 649 358C658 358 665 365 665 374C665 383 658 390 649 390C640 390 633 383 633 374Z" fill="#4F46E5" opacity="0.18"/>
  <path d="M636 370C639 364 645 360 652 360C660 360 667 366 667 374" fill="none" stroke="#4F46E5" stroke-width="1.8" stroke-linecap="round"/>
  <text x="700" y="344" class="title">DISHA Brain</text>
  <text x="700" y="368" class="text">Reasoning • Planning • Execution • Memory • Security</text>
  <text x="700" y="392" class="text">Module adapters • Events • WebSocket alerts</text>
  <text x="700" y="416" class="mono">disha/brain/</text>

  <!-- Security boundary -->
  <rect x="592" y="528" width="356" height="150" rx="20" fill="#FFFFFF" class="stroke" filter="url(#softShadow)"/>
  <use href="#ico_shield" x="620" y="560" width="26" height="26"/>
  <text x="660" y="566" class="title">Policy + Zero Trust</text>
  <text x="660" y="590" class="text">Auth • allowlist module actions • workspace scope</text>
  <text x="660" y="614" class="mono">disha/brain/security/</text>
  <rect x="660" y="636" width="220" height="30" rx="15" class="chip"/>
  <text x="676" y="656" class="chipText">NO-FAILURE RULES</text>

  <!-- Audit / storage -->
  <rect x="972" y="528" width="356" height="150" rx="20" fill="#FFFFFF" class="stroke" filter="url(#softShadow)"/>
  <use href="#ico_db" x="1000" y="560" width="26" height="26"/>
  <text x="1040" y="566" class="title">Audit + Memory Store</text>
  <text x="1040" y="590" class="text">Events • decisions • telemetry • risk logs</text>
  <text x="1040" y="614" class="mono">disha/brain/database/</text>

  <!-- Workflows -->
  <rect x="592" y="702" width="356" height="150" rx="20" fill="#FFFFFF" class="stroke" filter="url(#softShadow)"/>
  <circle cx="633" cy="766" r="13" fill="#E0E7FF" stroke="#4F46E5" stroke-width="1.5"/>
  <path d="M627 766H639" stroke="#4F46E5" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M633 760V772" stroke="#4F46E5" stroke-width="1.6" stroke-linecap="round"/>
  <text x="660" y="742" class="title">Brain Workflows</text>
  <text x="660" y="766" class="text">Command • telemetry • anomaly • risk • decisions</text>
  <text x="660" y="790" class="mono">disha/brain/brain/</text>

  <!-- Module adapters -->
  <rect x="972" y="702" width="356" height="150" rx="20" fill="#FFFFFF" class="stroke" filter="url(#softShadow)"/>
  <circle cx="1013" cy="766" r="13" fill="#E0F2FE" stroke="#0EA5E9" stroke-width="1.5"/>
  <path d="M1007 766H1019" stroke="#0EA5E9" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M1013 760V772" stroke="#0EA5E9" stroke-width="1.6" stroke-linecap="round"/>
  <text x="1040" y="742" class="title">Module Adapters</text>
  <text x="1040" y="766" class="text">Strategy • Integrations • physics • MCP • defense</text>
  <text x="1040" y="790" class="mono">disha/brain/modules/</text>

  <!-- Right column: Subsystems -->
  <rect x="1412" y="210" width="452" height="770" rx="26" fill="url(#panel)" class="stroke" filter="url(#softShadow)"/>
  <rect x="1412" y="210" width="452" height="7" rx="3.5" fill="url(#accent)"/>
  <text x="1444" y="252" class="section">SUBSYSTEMS</text>

  <!-- AI platform -->
  <rect x="1444" y="290" width="388" height="112" rx="20" fill="#FFFFFF" class="stroke" filter="url(#softShadow)"/>
  <circle cx="1484" cy="346" r="13" fill="#ECFDF5" stroke="#22C55E" stroke-width="1.5"/>
  <path d="M1478 346H1490" stroke="#22C55E" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M1484 340V352" stroke="#22C55E" stroke-width="1.6" stroke-linecap="round"/>
  <text x="1510" y="336" class="title">AI Platform</text>
  <text x="1510" y="360" class="text">Multi-agent intelligence backend</text>
  <text x="1510" y="384" class="mono">disha/services/ai-platform/</text>

  <!-- MCP server -->
  <rect x="1444" y="420" width="388" height="112" rx="20" fill="#FFFFFF" class="stroke" filter="url(#softShadow)"/>
  <use href="#ico_terminal" x="1466" y="456" />
  <text x="1510" y="466" class="title">MCP Server</text>
  <text x="1510" y="490" class="text">Repo-aware tool gateway (SSE/HTTP)</text>
  <text x="1510" y="514" class="mono">disha/services/mcp/</text>

  <!-- Strategy -->
  <rect x="1444" y="550" width="388" height="112" rx="20" fill="#FFFFFF" class="stroke" filter="url(#softShadow)"/>
  <circle cx="1484" cy="606" r="13" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <path d="M1478 606H1490" stroke="#4F46E5" stroke-width="1.6" stroke-linecap="round"/>
  <text x="1510" y="596" class="title">Historical Strategy</text>
  <text x="1510" y="620" class="text">Conflict dataset + simulation assets</text>
  <text x="1510" y="644" class="mono">disha/ai/strategy/</text>

  <!-- Physics -->
  <rect x="1444" y="680" width="388" height="112" rx="20" fill="#FFFFFF" class="stroke" filter="url(#softShadow)"/>
  <circle cx="1484" cy="736" r="13" fill="#E0F2FE" stroke="#38BDF8" stroke-width="1.5"/>
  <path d="M1484 728C1490 732 1490 740 1484 744C1478 740 1478 732 1484 728Z" fill="#38BDF8" opacity="0.20"/>
  <text x="1510" y="726" class="title">Quantum Physics</text>
  <text x="1510" y="750" class="text">Physics engines + API surface</text>
  <text x="1510" y="774" class="mono">disha/ai/physics/</text>

  <!-- Honeypots / cyber defense -->
  <rect x="1444" y="810" width="388" height="150" rx="20" fill="#FFFFFF" class="stroke" filter="url(#softShadow)"/>
  <use href="#ico_honey" x="1466" y="852" width="26" height="26"/>
  <text x="1510" y="846" class="title">Cyber Defense + Honeypots</text>
  <text x="1510" y="870" class="text">OpenCanary • Cowrie • Dionaea</text>
  <text x="1510" y="894" class="text">Telemetry → risk engine → alerts</text>
  <text x="1510" y="918" class="mono">disha/services/cyber/</text>

  <!-- Flows -->
  <!-- Experience -> Brain -->
  <path class="flow" d="M474 350H592"/>
  <path class="flow" d="M474 490H592"/>
  <path class="flow2" d="M474 630H592"/>

  <!-- Brain -> module adapters -> subsystems -->
  <path class="flow3" d="M1328 770H1444"/>
  <path class="flow3" d="M1328 346H1444"/>
  <path class="flow3" d="M1328 476H1444"/>
  <path class="flow3" d="M1328 606H1444"/>
  <path class="flow3" d="M1328 736H1444"/>

  <!-- Honeypots telemetry loop back to Brain workflows -->
  <path class="flow2" d="M1444 900C1320 900 1320 810 1100 810"/>
  <path class="flow2" d="M1100 810C900 810 900 780 948 780"/>

  <!-- Footer -->
  <rect x="96" y="1002" width="1768" height="30" rx="15" fill="#FFFFFF" class="stroke" filter="url(#softShadow)"/>
  <text x="118" y="1022" class="text">End-to-end: Web/CLI/Edge → DISHA Brain → policy gate → module adapters → subsystems → external providers. Honeypots feed deception telemetry back into risk + alert pipelines.</text>
</svg>

