<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#172036"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.5"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M2 2L10 6L2 10V2Z" fill="#38BDF8"/>
    </marker>
    <style>
      .title { font: 800 36px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #F8FAFC; }
      .subtitle { font: 500 16px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #94A3B8; }
      .section { font: 700 13px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #CBD5E1; letter-spacing: 0.14em; }
      .cardTitle { font: 800 18px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #F8FAFC; }
      .cardText { font: 500 13px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #CBD5E1; }
      .mini { font: 800 11px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #E2E8F0; letter-spacing: 0.10em; }
      .mono { font: 600 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; fill: #CBD5E1; }
      .stroke { stroke: #334155; }
      .flow { stroke: #38BDF8; stroke-width: 4; fill: none; marker-end: url(#arrow); opacity: 0.9; }
      .flow2 { stroke: #22C55E; stroke-width: 4; fill: none; marker-end: url(#arrow); opacity: 0.9; }
      .flow3 { stroke: #4F46E5; stroke-width: 4; fill: none; marker-end: url(#arrow); opacity: 0.9; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" rx="28" fill="#0F172A"/>
  <rect x="56" y="56" width="1808" height="968" rx="28" fill="none" stroke="#1E293B" stroke-width="1.5"/>

  <!-- Header -->
  <text x="96" y="126" class="title">DISHA Brain Platform Architecture</text>
  <text x="96" y="154" class="subtitle">Control-plane centered architecture with zero-trust boundaries, module adapters, honeypots, and full observability</text>

  <!-- Left column: Experience -->
  <rect x="96" y="210" width="400" height="770" rx="28" fill="url(#panel)" stroke="#24324A" filter="url(#shadow)"/>
  <rect x="96" y="210" width="400" height="8" rx="4" fill="url(#accentLine)"/>
  <text x="128" y="252" class="section">EXPERIENCE</text>

  <rect x="128" y="290" width="336" height="120" rx="22" fill="#111C33" stroke="#334155"/>
  <circle cx="170" cy="350" r="20" fill="#4F46E5"/>
  <text x="160" y="354" class="mini">WEB</text>
  <text x="204" y="336" class="cardTitle">Operator Console</text>
  <text x="204" y="360" class="cardText">Next.js UI, protected workflows</text>
  <text x="204" y="382" class="mono">web/</text>

  <rect x="128" y="430" width="336" height="120" rx="22" fill="#111C33" stroke="#334155"/>
  <circle cx="170" cy="490" r="20" fill="#38BDF8"/>
  <text x="160" y="494" class="mini">CLI</text>
  <text x="204" y="476" class="cardTitle">Secure CLI Runtime</text>
  <text x="204" y="500" class="cardText">MCP tools, secure storage, audit</text>
  <text x="204" y="522" class="mono">src/</text>

  <rect x="128" y="570" width="336" height="120" rx="22" fill="#111C33" stroke="#334155"/>
  <circle cx="170" cy="630" r="20" fill="#22C55E"/>
  <text x="156" y="634" class="mini">EDGE</text>
  <text x="204" y="616" class="cardTitle">Desktop Agent</text>
  <text x="204" y="640" class="cardText">Telemetry + event forwarding</text>
  <text x="204" y="662" class="mono">disha/edge_agent/</text>

  <rect x="128" y="710" width="336" height="120" rx="22" fill="#111C33" stroke="#334155"/>
  <circle cx="170" cy="770" r="20" fill="#94A3B8"/>
  <text x="154" y="774" class="mini">MOB</text>
  <text x="204" y="756" class="cardTitle">Mobile Companion</text>
  <text x="204" y="780" class="cardText">Chat, alerts, settings scaffold</text>
  <text x="204" y="802" class="mono">disha/mobile/</text>

  <!-- Center: DISHA Brain control plane -->
  <rect x="540" y="210" width="820" height="770" rx="28" fill="url(#panel)" stroke="#24324A" filter="url(#shadow)"/>
  <rect x="540" y="210" width="820" height="8" rx="4" fill="url(#accentLine)" opacity="0.95"/>
  <text x="572" y="252" class="section">CONTROL PLANE</text>

  <!-- Big brain node -->
  <rect x="592" y="290" width="716" height="190" rx="26" fill="#0B1225" stroke="#334155"/>
  <circle cx="650" cy="365" r="30" fill="#4F46E5"/>
  <text x="632" y="370" class="mini">BRAIN</text>
  <text x="700" y="338" class="cardTitle">DISHA Brain API</text>
  <text x="700" y="362" class="cardText">Reasoning • Planning • Execution • Memory • Security</text>
  <text x="700" y="384" class="cardText">Module adapters • Events • WebSocket alerts</text>
  <text x="700" y="410" class="mono">disha/brain/</text>

  <!-- Control plane sub-cards -->
  <rect x="592" y="510" width="340" height="140" rx="22" fill="#111C33" stroke="#334155"/>
  <circle cx="638" cy="580" r="18" fill="#38BDF8"/>
  <text x="626" y="584" class="mini">SEC</text>
  <text x="668" y="566" class="cardTitle">Zero-Trust Boundary</text>
  <text x="668" y="590" class="cardText">Auth token, allowlist policy, workspace scope</text>
  <text x="668" y="612" class="mono">disha/brain/security/</text>

  <rect x="968" y="510" width="340" height="140" rx="22" fill="#111C33" stroke="#334155"/>
  <circle cx="1014" cy="580" r="18" fill="#22C55E"/>
  <text x="1003" y="584" class="mini">AUD</text>
  <text x="1044" y="566" class="cardTitle">Audit + Decisions</text>
  <text x="1044" y="590" class="cardText">Every decision logged, alerts with reasons</text>
  <text x="1044" y="612" class="mono">disha/brain/database/</text>

  <rect x="592" y="670" width="340" height="140" rx="22" fill="#111C33" stroke="#334155"/>
  <circle cx="638" cy="740" r="18" fill="#4F46E5"/>
  <text x="626" y="744" class="mini">SVC</text>
  <text x="668" y="726" class="cardTitle">Brain Workflows</text>
  <text x="668" y="750" class="cardText">Command, telemetry, anomaly, risk, decision</text>
  <text x="668" y="772" class="mono">disha/brain/brain/</text>

  <rect x="968" y="670" width="340" height="140" rx="22" fill="#111C33" stroke="#334155"/>
  <circle cx="1014" cy="740" r="18" fill="#38BDF8"/>
  <text x="1003" y="744" class="mini">MOD</text>
  <text x="1044" y="726" class="cardTitle">Module Adapters</text>
  <text x="1044" y="750" class="cardText">Strategy + Integrations + external services</text>
  <text x="1044" y="772" class="mono">disha/brain/modules/</text>

  <!-- Right column: Subsystems -->
  <rect x="1404" y="210" width="460" height="770" rx="28" fill="url(#panel)" stroke="#24324A" filter="url(#shadow)"/>
  <rect x="1404" y="210" width="460" height="8" rx="4" fill="url(#accentLine)"/>
  <text x="1436" y="252" class="section">SUBSYSTEMS</text>

  <rect x="1436" y="290" width="396" height="110" rx="22" fill="#111C33" stroke="#334155"/>
  <circle cx="1482" cy="345" r="18" fill="#22C55E"/>
  <text x="1470" y="349" class="mini">AI</text>
  <text x="1512" y="334" class="cardTitle">AI Platform</text>
  <text x="1512" y="358" class="cardText">Multi-agent intelligence backend</text>
  <text x="1512" y="380" class="mono">disha/services/ai-platform/</text>

  <rect x="1436" y="418" width="396" height="110" rx="22" fill="#111C33" stroke="#334155"/>
  <circle cx="1482" cy="473" r="18" fill="#38BDF8"/>
  <text x="1467" y="477" class="mini">MCP</text>
  <text x="1512" y="462" class="cardTitle">MCP Server</text>
  <text x="1512" y="486" class="cardText">Repo-aware tool gateway</text>
  <text x="1512" y="508" class="mono">disha/services/mcp/</text>

  <rect x="1436" y="546" width="396" height="110" rx="22" fill="#111C33" stroke="#334155"/>
  <circle cx="1482" cy="601" r="18" fill="#4F46E5"/>
  <text x="1467" y="605" class="mini">PHY</text>
  <text x="1512" y="590" class="cardTitle">Quantum Physics</text>
  <text x="1512" y="614" class="cardText">Physics engines + API surface</text>
  <text x="1512" y="636" class="mono">disha/ai/physics/</text>

  <rect x="1436" y="674" width="396" height="140" rx="22" fill="#111C33" stroke="#334155"/>
  <circle cx="1482" cy="744" r="18" fill="#22C55E"/>
  <text x="1466" y="748" class="mini">DEF</text>
  <text x="1512" y="724" class="cardTitle">Cyber Defense + Honeypots</text>
  <text x="1512" y="748" class="cardText">Cowrie • OpenCanary • Dionaea</text>
  <text x="1512" y="770" class="cardText">Model engine • Response engine</text>
  <text x="1512" y="794" class="mono">disha/services/cyber/</text>

  <rect x="1436" y="834" width="396" height="110" rx="22" fill="#111C33" stroke="#334155"/>
  <circle cx="1482" cy="889" r="18" fill="#94A3B8"/>
  <text x="1468" y="893" class="mini">INT</text>
  <text x="1512" y="878" class="cardTitle">Integrations</text>
  <text x="1512" y="902" class="cardText">Catalogued connectors + tools</text>
  <text x="1512" y="924" class="mono">disha/services/integrations/</text>

  <!-- Data stores band (bottom) -->
  <rect x="96" y="1002" width="1768" height="28" rx="14" fill="#111827"/>
  <text x="118" y="1021" class="subtitle">Flows: Web/CLI/Edge -> DISHA Brain -> module adapters -> subsystems -> external providers. Deception telemetry -> brain risk engine -> alerts + audit.</text>

  <!-- Flow arrows -->
  <!-- Web -> Brain -->
  <path class="flow" d="M464 350H592"/>
  <!-- CLI -> Brain -->
  <path class="flow" d="M464 490H592"/>
  <!-- Edge -> Brain -->
  <path class="flow2" d="M464 630H592"/>

  <!-- Brain -> Subsystems -->
  <path class="flow3" d="M1308 365H1436"/>
  <path class="flow3" d="M1308 740H1436"/>
  <path class="flow3" d="M1308 580H1436"/>
  <path class="flow3" d="M1308 889H1436"/>

  <!-- Honeypots telemetry back to Brain -->
  <path class="flow2" d="M1436 744C1330 744 1330 780 1308 780"/>
  <path class="flow2" d="M1308 780C1080 780 1080 460 920 460"/>
  <path class="flow2" d="M920 460C760 460 760 430 650 430"/>
</svg>

