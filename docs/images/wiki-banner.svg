<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200">
  <defs>
    <linearGradient id="wiki-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="wiki-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#533483"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="200" fill="url(#wiki-bg)" rx="12"/>
  
  <!-- Decorative dots -->
  <g opacity="0.08" fill="#fff">
    <circle cx="50" cy="50" r="3"/><circle cx="100" cy="30" r="2"/><circle cx="150" cy="70" r="3"/>
    <circle cx="200" cy="40" r="2"/><circle cx="1050" cy="150" r="3"/><circle cx="1100" cy="130" r="2"/>
    <circle cx="1150" cy="170" r="3"/><circle cx="80" cy="150" r="2"/><circle cx="130" cy="170" r="3"/>
  </g>
  
  <!-- Book icon -->
  <g transform="translate(150, 50)">
    <text font-size="60" fill="#e94560" opacity="0.8">📖</text>
  </g>
  
  <!-- Title -->
  <text x="280" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="800" fill="#ffffff">DISHA WIKI</text>
  <text x="280" y="135" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#94a3b8">Complete Technical Documentation &amp; Reference Guide</text>
  
  <!-- Bottom line -->
  <rect x="0" y="194" width="1200" height="6" fill="url(#wiki-accent)" rx="0"/>
</svg>
