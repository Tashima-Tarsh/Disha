[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "disha.ai.core.auto_learning.tests.*"
ignore_errors = true

[[tool.mypy.overrides]]
module = "disha.ai.core.tests.*"
ignore_errors = true

[[tool.mypy.overrides]]
module = "*.tests.*"
ignore_errors = true

# ── Optional heavy-dep modules (torch / transformers / peft) ─────────────
# These use guarded `try: import torch` patterns. When torch is absent in CI,
# missing types resolve to Any, triggering warn_return_any / warn_unused_ignores.
# We relax only those two flags per-module; all other strict checks remain.
[[tool.mypy.overrides]]
module = [
    "disha.ai.core.auto_learning.*",
    "disha.ai.core.intelligence.*",
    "disha.ai.core.cognitive_loop",
    "disha.ai.core.graph_reasoner",
]
warn_return_any = false
warn_unused_ignores = false
ignore_missing_imports = true

# ── Legacy / tool files with external unavailable imports ─────────────────
[[tool.mypy.overrides]]
module = [
    "disha.ai.core.ast_indexer",
    "disha.ai.core.decision_engine.utils.retriever_faiss",
    "disha.ai.core.decision_engine.utils.build_faiss_index",
    "disha.ai.core.decision_engine.utils.case_law_ingest",
    "disha.services.*",
]
ignore_errors = true

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP"]
ignore = ["E501", "C901", "UP042", "E402", "UP007"]

[tool.pyrefly]
python_interpreter = "C:/Users/lenovo/AppData/Local/Programs/Python/Python313/python.exe"

[tool.pytest.ini_options]
asyncio_mode = "strict"
