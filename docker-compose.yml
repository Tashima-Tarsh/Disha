version: "3.9"

services:
  # ─── Intelligence Platform ─────────────────────
  ai-backend:
    build:
      context: ./disha/services/ai-platform
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=${DEBUG:-false}
      - SECRET_KEY=${SECRET_KEY:-disha-secret-key-change-me}
      - POSTGRES_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/intelligence_db
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-disha-neo4j-pass}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - disha-net

  ai-frontend:
    build:
      context: ./disha/services/ai-platform
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3001:3001"
    environment:
      # Use internal service name for server-side fetches, localhost for browser
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_BACKEND_URL=http://ai-backend:8000/api/v1
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/api/v1/ws/alerts
      - NEXT_PUBLIC_QUANTUM_API_URL=http://localhost:8002
    depends_on:
      - ai-backend
    networks:
      - disha-net

  # ─── Cyber Defense ──────────────────────────────
  cowrie:
    build: ./disha/services/cyber/honeypot/cowrie
    ports:
      - "2222:2222"
    volumes:
      - ./disha/services/cyber/logs/cowrie:/cowrie/log
    networks:
      - disha-net

  opencanary:
    build: ./disha/services/cyber/honeypot/opencanary
    ports:
      - "8081:8080"
      - "2121:21"
    volumes:
      - ./disha/services/cyber/logs/opencanary:/var/log/opencanary
    networks:
      - disha-net

  dionaea:
    build: ./disha/services/cyber/honeypot/dionaea
    ports:
      - "8082:80"
      - "445:445"
    networks:
      - disha-net

  cyber-model-engine:
    build: ./disha/services/cyber/model
    volumes:
      - ./disha/services/cyber/logs:/logs:ro
    environment:
      - LOG_DIR=/logs
      - AI_BACKEND_URL=http://ai-backend:8000/api/v1
    depends_on:
      - cowrie
      - opencanary
    networks:
      - disha-net

  cyber-response-engine:
    build: ./disha/services/cyber/response_engine
    environment:
      - AI_BACKEND_URL=http://ai-backend:8000/api/v1
    depends_on:
      - cyber-model-engine
    networks:
      - disha-net

  threat-intel:
    build: ./disha/services/cyber/scripts/threat_intel
    environment:
      - AI_BACKEND_URL=http://ai-backend:8000/api/v1
    networks:
      - disha-net

  # ─── Physics Engine ────────────────────────────
  quantum-physics:
    build: ./disha/ai/physics/backend
    ports:
      - "8002:8002"
    networks:
      - disha-net

  # ─── Infrastructure ────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: intelligence_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - disha-net

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-disha-neo4j-pass}
      NEO4J_PLUGINS: '["apoc"]'
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-disha-neo4j-pass} 'RETURN 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - disha-net

  chromadb:
    image: chromadb/chroma:0.5.0
    networks:
      - disha-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - disha-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - disha-net

networks:
  disha-net:
    driver: bridge
