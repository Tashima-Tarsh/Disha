version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: disha
      POSTGRES_USER: disha
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U disha -d disha"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  disha-brain:
    build:
      context: .
      dockerfile: disha/brain/Dockerfile
    environment:
      DISHA_BRAIN_API_HOST: 0.0.0.0
      DISHA_BRAIN_API_PORT: 8080
      DISHA_BRAIN_API_TOKEN: ${DISHA_BRAIN_API_TOKEN:-change-me}
      DISHA_WORKSPACE_ROOT: /workspace
      DISHA_ALLOWED_ORIGINS: http://localhost:3000
      DISHA_BRAIN_DB_PATH: /data/disha_brain.db
      DISHA_AI_PLATFORM_URL: http://ai-platform:8000/api/v1
      DISHA_MCP_HTTP_URL: http://mcp-server:4000
      DISHA_PHYSICS_URL: http://quantum-physics:8002
      DISHA_OPENCANARY_URL: http://opencanary:8080
    volumes:
      - ./data:/data
      - ./:/workspace:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/v1/health').read(); print('ok')\""]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      DISHA_AUTH_MODE: dev-jwt
      DISHA_JWT_SECRET: ${DISHA_JWT_SECRET:-replace-with-at-least-32-random-characters}
      DISHA_DEV_PASSWORD: ${DISHA_DEV_PASSWORD:-replace-with-local-password}
      DATABASE_URL: postgresql://disha:${POSTGRES_PASSWORD:-postgres}@postgres:5432/disha
      REDIS_URL: redis://redis:6379
      DISHA_WORKSPACE_ROOT: /workspace
      DISHA_ALLOWED_ORIGINS: http://localhost:3000
      # Optional: connect UI features to the brain service when enabled.
      DISHA_BRAIN_URL: http://disha-brain:8080
      NEXT_PUBLIC_API_URL: http://localhost:3000
    volumes:
      - ./:/workspace:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      disha-brain:
        condition: service_healthy
    ports:
      - "3000:3000"

  # Optional modules (enable with: `docker compose --profile full up --build`)
  mcp-server:
    profiles: ["full"]
    build:
      context: ./disha/services/mcp
      dockerfile: Dockerfile
    environment:
      PORT: 4000
      DISHA_SRC_ROOT: /workspace
    volumes:
      - ./:/workspace:ro
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10

  quantum-physics:
    profiles: ["full"]
    build:
      context: ./disha/ai/physics/backend
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8002/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10

  ai-platform:
    profiles: ["full"]
    build:
      context: ./disha/services/ai-platform
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:-disha-secret-key-change-me}
      POSTGRES_URL: postgresql://disha:${POSTGRES_PASSWORD:-postgres}@postgres:5432/disha
      CORS_ORIGINS: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/api/v1/health >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 8s
      retries: 10

  opencanary:
    profiles: ["full"]
    build: ./disha/services/cyber/honeypot/opencanary
    ports:
      - "8081:8080"
      - "2121:21"
    volumes:
      - ./disha/services/cyber/logs/opencanary:/var/log/opencanary
