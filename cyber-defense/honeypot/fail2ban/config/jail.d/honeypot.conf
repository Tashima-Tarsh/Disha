# =============================================================================
# Fail2ban Jail Configuration for Disha Honeypots
#
# Monitors honeypot logs and bans IPs that exhibit malicious behavior.
# =============================================================================

[DEFAULT]
bantime = 3600
findtime = 600
maxretry = 5
backend = auto
action = %(action_)s

[cowrie-ssh]
enabled = true
filter = cowrie
logpath = /data/input/cowrie/cowrie.json
maxretry = 3
bantime = 7200

[fakeapi-bruteforce]
enabled = true
filter = fakeapi
logpath = /data/input/fakeapi/api-activity.json
maxretry = 10
bantime = 3600
