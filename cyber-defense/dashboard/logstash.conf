# =============================================================================
# Logstash Pipeline Configuration
# Disha Virtual Cyber Defense System
#
# Ingests structured JSON logs from honeypots and forwards
# them to Elasticsearch for real-time monitoring in Kibana.
# =============================================================================

input {
  # Cowrie SSH honeypot logs
  file {
    path => "/var/log/honeypot/cowrie/cowrie.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => json
    type => "cowrie"
    tags => ["honeypot", "ssh"]
  }

  # Dionaea multi-protocol honeypot logs
  file {
    path => "/var/log/honeypot/dionaea/dionaea.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => json
    type => "dionaea"
    tags => ["honeypot", "multi-protocol"]
  }

  # Fake API honeypot logs
  file {
    path => "/var/log/honeypot/fakeapi/api-activity.json"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => json
    type => "fakeapi"
    tags => ["honeypot", "api"]
  }
}

filter {
  # Parse timestamp
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }

  # Add GeoIP data for attacker IPs
  if [ip] {
    geoip {
      source => "ip"
      target => "geoip"
    }
  }

  if [src_ip] {
    geoip {
      source => "src_ip"
      target => "geoip"
    }
  }

  # Add threat classification tags
  if [endpoint] =~ /admin|\.env|wp-admin|phpmyadmin/ {
    mutate {
      add_tag => ["suspicious_path"]
    }
  }

  if [payload] =~ /SELECT|UNION|DROP|INSERT|DELETE/ {
    mutate {
      add_tag => ["sql_injection_attempt"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "honeypot-logs-%{+YYYY.MM.dd}"
  }

  # Debug output (remove in production)
  stdout {
    codec => rubydebug
  }
}
