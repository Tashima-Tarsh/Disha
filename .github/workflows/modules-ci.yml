name: Modules CI

on:
  push:
    branches: [main]
    paths:
      - 'disha/ai/strategy/**'
      - 'disha/ai/physics/**'
  pull_request:
    branches: [main]
    paths:
      - 'disha/ai/strategy/**'
      - 'disha/ai/physics/**'

permissions:
  contents: read

jobs:
  historical-strategy:
    name: Lint Python (Historical Strategy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install flake8
          pip install -r disha/ai/strategy/requirements.txt

      - name: Lint
        run: flake8 disha/ai/strategy/ --max-line-length=120 --ignore=E501,W503,W504 --exclude=disha/ai/strategy/dashboard/

      - name: Run tests (if any)
        run: |
          cd disha/ai/strategy
          python -m pytest tests/ -v --tb=short 2>/dev/null || echo "No tests found — skipping."

  quantum-physics:
    name: Lint Python (Quantum Physics)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install flake8

      - name: Lint
        run: flake8 disha/ai/physics/backend/ --max-line-length=120 --ignore=E501,W503,W504
