name: Modules CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  historical-strategy:
    name: Lint Python (Historical Strategy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install ruff
          pip install -r disha/ai/strategy/requirements.txt

      - name: Lint with ruff
        run: ruff check disha/ai/strategy/ --output-format=github --exclude=disha/ai/strategy/dashboard/

      - name: Run tests (if any)
        run: |
          if [ -d "disha/ai/strategy/tests" ] && ls disha/ai/strategy/tests/test_*.py 2>/dev/null; then
            cd disha/ai/strategy
            python -m pytest tests/ -v --tb=short
          else
            echo "No tests found in disha/ai/strategy/tests/ — skipping."
          fi

  quantum-physics:
    name: Lint Python (Quantum Physics)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check disha/ai/physics/backend/ --output-format=github
