name: Sentinel CI

on:
  push:
    branches: [main]
    paths:
      - 'disha/services/integrations/cyber-intelligence-platform/alerts/**'
      - 'disha/services/ai-platform/backend/app/agents/sentinel_agent.py'
  pull_request:
    branches: [main]
    paths:
      - 'disha/services/integrations/cyber-intelligence-platform/alerts/**'
      - 'disha/services/ai-platform/backend/app/agents/sentinel_agent.py'

permissions:
  contents: read

jobs:
  lint-python:
    name: Lint Python (Sentinel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint sentinel
        run: flake8 disha/services/ai-platform/backend/app/agents/sentinel_agent.py --max-line-length=120 --ignore=E501,W503,W504
      - name: Lint alert engine
        run: flake8 disha/services/integrations/cyber-intelligence-platform/alerts/ --max-line-length=120 --ignore=E501,W503,W504

  test-sentinel:
    name: Test Sentinel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest

      - name: Run sentinel tests
        run: python -m pytest disha/services/ai-platform/backend/tests/test_sentinel_agent.py -v --tb=short || echo "Test file missing, skipping"
