name: Sentinel CI

on:
  push:
    branches: [main]
    paths:
      - 'disha/legacy-root-src/scripts/sentinel/**'
      - 'disha/services/integrations/cyber-intelligence-platform/alerts/**'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/sentinel/**'
      - 'integrations/cyber-intelligence-platform/alerts/**'

permissions:
  contents: read

jobs:
  lint-python:
    name: Lint Python (Sentinel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint sentinel
        run: flake8 disha/legacy-root-src/scripts/sentinel/ --max-line-length=120 --ignore=E501,W503,W504
      - name: Lint alert engine
        run: flake8 disha/services/integrations/cyber-intelligence-platform/alerts/ --max-line-length=120 --ignore=E501,W503,W504

  test-sentinel:
    name: Test Sentinel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest

      - name: Run sentinel tests
        run: python -m pytest disha/legacy-root-src/scripts/sentinel/test_sentinel.py -v --tb=short
