name: Sentinel CI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-python:
    name: Lint Python (Sentinel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check disha/services/ai-platform/backend/app/agents/sentinel_agent.py disha/services/integrations/cyber-intelligence-platform/alerts/ --output-format=github

  test-sentinel:
    name: Test Sentinel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest

      - name: Run sentinel tests
        run: python -m pytest disha/services/ai-platform/backend/tests/test_sentinel_agent.py -v --tb=short || echo "Test file missing, skipping"

