name: DISHA Security Pipeline
# Section 2 of the Cyber Defense Suite Blueprint (Week 1)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast-python:
    name: Python SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit
        run: bandit -r disha/services/ai-platform/backend disha/services/cyber disha/ai/core -f json -o bandit-results.json || true
      - name: Upload Bandit Results
        uses: actions/upload-artifact@v4
        with:
          name: bandit-results
          path: bandit-results.json

  dependency-scan:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Run pip-audit (AI Platform backend)
        run: |
          pip-audit -r disha/services/ai-platform/backend/requirements.txt \
            --format json --output safety-results-service.json \
            --skip-editable || true
      - name: Run pip-audit (AI Core)
        run: |
          pip-audit -r disha/ai/core/requirements.txt \
            --format json --output safety-results-core.json \
            --skip-editable || true
      - name: Upload Audit Results
        uses: actions/upload-artifact@v4
        with:
          name: safety-results
          path: safety-results-*.json

  sbom-generation:
    name: SBOM Generation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install CycloneDX
        run: pip install cyclonedx-bom
      - name: Generate SBOM (CycloneDX)
        run: |
          pip install -r disha/services/ai-platform/backend/requirements.txt --dry-run 2>/dev/null || true
          cyclonedx-py pip --outfile bom.json --format json \
            disha/services/ai-platform/backend/requirements.txt || \
          python -m cyclonedx_py.command requirements \
            disha/services/ai-platform/backend/requirements.txt \
            --output-format JSON --outfile bom.json || \
          echo "SBOM generation skipped — check cyclonedx-bom version compatibility"
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: bom.json
          if-no-files-found: warn
