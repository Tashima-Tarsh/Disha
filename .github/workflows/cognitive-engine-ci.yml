name: Cognitive Engine CI

on:
  push:
    branches: [main]
    paths:
      - 'cognitive-engine/**'
  pull_request:
    branches: [main]
    paths:
      - 'cognitive-engine/**'

permissions:
  contents: read

jobs:
  lint:
    name: Lint Python (Cognitive Engine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint
        run: flake8 cognitive-engine/ --max-line-length=120 --ignore=E501,W503,W504

  test:
    name: Unit Tests (Cognitive Engine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio pytest-cov
          pip install -r cognitive-engine/requirements.txt

      - name: Run tests with coverage
        run: |
          cd cognitive-engine
          python -m pytest tests/ -v --tb=short \
            --cov=cognitive_engine \
            --cov-report=term-missing \
            --cov-fail-under=70
        env:
          DISHA_MODEL_PROVIDER: mock
