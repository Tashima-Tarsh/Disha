name: Cognitive Engine CI

on:
  push:
    branches: [main]
    paths:
      - 'disha/ai/core/**'
  pull_request:
    branches: [main]
    paths:
      - 'disha/ai/core/**'

permissions:
  contents: read

jobs:
  lint:
    name: Lint Python (Cognitive Engine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check disha/ai/core/ --output-format=github
      - name: Format check with ruff
        run: ruff format disha/ai/core/ --check

  test:
    name: Unit Tests (Cognitive Engine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio pytest-cov
          pip install -r disha/ai/core/requirements.txt

      - name: Run tests with coverage
        run: |
          cd disha/ai/core
          python -m pytest tests/ -v --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-fail-under=10
        env:
          DISHA_MODEL_PROVIDER: mock
          PYTHONPATH: ${{ github.workspace }}
