name: Decision Framework CI

on:
  push:
    branches: [main]
    paths:
      - 'decision-framework/**'
  pull_request:
    branches: [main]
    paths:
      - 'decision-framework/**'

permissions:
  contents: read

jobs:
  test:
    name: Tests (Decision Framework)
    runs-on: ubuntu-latest
    env:
      DISHA_MODEL_PROVIDER: mock
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r decision-framework/requirements.txt

      - name: Run tests
        run: |
          cd decision-framework
          python -m pytest tests/ -v --tb=short

  test-with-faiss:
    name: Tests with FAISS (optional)
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      DISHA_MODEL_PROVIDER: mock
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (with FAISS)
        run: |
          pip install -r decision-framework/requirements.txt
          pip install faiss-cpu sentence-transformers

      - name: Run all tests (including FAISS)
        run: |
          cd decision-framework
          python -m pytest tests/ -v --tb=short

  lint:
    name: Lint Python (Decision Framework)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint
        run: flake8 decision-framework/ --max-line-length=120 --ignore=E501,W503,W504 --exclude=decision-framework/__pycache__,decision-framework/data
