name: Engineering Excellence (Quality Gate)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    name: Code Quality & Type Safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install quality-gate dependencies
        run: |
          pip install --upgrade pip
          # Only lightweight deps needed for ruff/mypy/bandit — no torch, no langchain
          pip install ruff mypy pydantic>=2.0 pydantic-settings>=2.0 structlog numpy networkx

      - name: Lint with ruff
        run: ruff check .

      - name: Type Check with mypy
        run: |
          mypy disha/ai/core/ --ignore-missing-imports --strict

      - name: Security Scan
        run: |
          pip install bandit
          # -ll = report MEDIUM+ severity only; --exit-zero = exit 0 for reporting
          # (bandit exits 1 for ANY finding regardless of -ll filter)
          # We fail only on actual high-severity issues via the JSON output check
          bandit -r disha/ai/core/ \
            --exclude disha/ai/core/decision_engine/venv,.venv,venv \
            -ll \
            --format json \
            --output bandit-report.json \
            || true
          # Fail the step if any HIGH severity issues are found
          python - <<'EOF'
          import json, sys
          try:
              with open("bandit-report.json") as f:
                  report = json.load(f)
          except Exception:
              sys.exit(0)
          high_issues = [
              r for r in report.get("results", [])
              if r.get("issue_severity") == "HIGH"
          ]
          if high_issues:
              print(f"FAILED: {len(high_issues)} HIGH severity security issue(s) found:")
              for i in high_issues:
                  print(f"  [{i['test_id']}] {i['issue_text']} @ {i['filename']}:{i['line_number']}")
              sys.exit(1)
          medium_issues = [
              r for r in report.get("results", [])
              if r.get("issue_severity") == "MEDIUM"
          ]
          if medium_issues:
              print(f"WARNING: {len(medium_issues)} MEDIUM severity issue(s) found (review required):")
              for i in medium_issues:
                  print(f"  [{i['test_id']}] {i['issue_text']} @ {i['filename']}:{i['line_number']}")
          print(f"Security scan complete. High: {len(high_issues)}, Medium: {len(medium_issues)}")
          EOF
