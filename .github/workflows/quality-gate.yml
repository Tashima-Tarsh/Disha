name: Engineering Excellence (Quality Gate)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Lint & Format ──────────────────────────────────────────────
  lint:
    name: "🔍 Lint & Format (ruff)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install "ruff>=0.9.0"

      - name: Check style
        run: ruff check . --output-format=github

      - name: Check formatting
        run: ruff format . --check

  # ── Job 2: Type Safety ────────────────────────────────────────────────
  typecheck:
    name: "🔬 Type Safety (mypy strict)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install type-checking deps
        run: |
          pip install --upgrade pip
          pip install \
            "mypy>=1.8" \
            "pydantic>=2.0" \
            "pydantic-settings>=2.0" \
            "structlog>=21.0" \
            "numpy>=1.24" \
            "networkx>=3.0"

      - name: Run mypy strict
        run: mypy disha/ai/core/

  # ── Job 3: Security ───────────────────────────────────────────────────
  security:
    name: "🛡️ Security Scan (bandit)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install bandit
        run: pip install "bandit>=1.7"

      - name: Scan — fail on HIGH severity only
        run: |
          bandit -r disha/ai/core/ \
            --exclude disha/ai/core/decision_engine/venv \
            --format json \
            --output bandit.json \
            --exit-zero

          # Gate: fail if any HIGH severity issues found in our code
          python3 -c "
          import json, sys
          data = json.load(open('bandit.json'))
          high = [r for r in data.get('results',[]) if r['issue_severity']=='HIGH']
          med  = [r for r in data.get('results',[]) if r['issue_severity']=='MEDIUM']
          for r in high:
              print('HIGH:', r['test_id'], r['issue_text'], r['filename'], r['line_number'])
          for r in med:
              print('WARN:', r['test_id'], r['issue_text'], r['filename'], r['line_number'])
          print(f'Scan complete — HIGH:{len(high)} MEDIUM:{len(med)}')
          sys.exit(1 if high else 0)
          "
