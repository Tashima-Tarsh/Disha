name: Release (Images + OS ISO)

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker:
    name: Build & Publish Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push disha-web
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/disha-web:latest
            ghcr.io/${{ github.repository_owner }}/disha-web:${{ github.sha }}

      - name: Build & push disha-brain
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./disha/brain/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/disha-brain:latest
            ghcr.io/${{ github.repository_owner }}/disha-brain:${{ github.sha }}

  os:
    name: Build DISHA OS ISO (x86_64 BIOS+UEFI)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install live-build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            live-build debootstrap xorriso rsync ca-certificates curl

      - name: Build ISO
        run: |
          chmod +x os/debian-live/build.sh
          ./os/debian-live/build.sh

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: disha-os-amd64-iso
          path: os/out/disha-os-amd64.iso
          if-no-files-found: error

