name: Cyber Defense CI

on:
  push:
    branches: [main]
    paths:
      - 'disha/services/cyber/**'
  pull_request:
    branches: [main]
    paths:
      - 'disha/services/cyber/**'

permissions:
  contents: read

jobs:
  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check disha/services/cyber/ --output-format=github

  test-python:
    name: Test Python Components
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install scikit-learn numpy requests pytest

      - name: Run tests
        run: |
          cd disha/services/cyber
          python -m pytest tests/ -v

  validate-configs:
    name: Validate Configurations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate docker-compose
        run: |
          cd disha/services/cyber
          if docker compose version >/dev/null 2>&1; then
            docker compose config --quiet
          elif docker-compose version >/dev/null 2>&1; then
            docker-compose config --quiet
          else
            echo "Docker Compose not available — skipping config validation"
          fi

      - name: Validate JSON logs
        run: |
          python3 -c "
          import json, glob
          for f in glob.glob('disha/services/cyber/logs/**/*.json', recursive=True):
              with open(f) as fh:
                  for i, line in enumerate(fh, 1):
                      line = line.strip()
                      if not line: continue
                      json.loads(line)
              print(f'  OK: {f}')
          print('All JSON logs valid.')
          "
