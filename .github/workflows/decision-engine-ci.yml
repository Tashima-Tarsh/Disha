name: Decision Engine CI

on:
  push:
    branches: [main]
    paths:
      - 'disha/ai/core/decision_engine/**'
      - 'disha/ai/core/api/**'
  pull_request:
    branches: [main]
    paths:
      - 'disha/ai/core/decision_engine/**'
      - 'disha/ai/core/api/**'

permissions:
  contents: read

jobs:
  test:
    name: Tests (Decision Engine — mock provider)
    runs-on: ubuntu-latest
    env:
      DISHA_MODEL_PROVIDER: mock
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r disha/ai/core/decision_engine/requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check disha/ai/core/decision_engine/ --output-format=github
          ruff format disha/ai/core/decision_engine/ --check

      - name: Run tests
        run: |
          python -m pytest disha/ai/core/decision_engine/tests/ -v --tb=short \
            -p no:cacheprovider
