name: AI Platform CI

on:
  push:
    branches: [main]
    paths:
      - 'disha/services/ai-platform/**'
      - 'disha/scripts/**'
      - 'disha/ai/core/**'
  pull_request:
    branches: [main]
    paths:
      - 'disha/services/ai-platform/**'
      - 'disha/scripts/**'
      - 'disha/ai/core/**'

permissions:
  contents: read

jobs:
  lint-python:
    name: Lint Python (AI Platform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check disha/services/ai-platform/backend/app/ --output-format=github

      - name: Format check with ruff
        run: ruff format disha/services/ai-platform/backend/app/ --check

  test-python:
    name: Test Python (AI Platform)
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
      DISHA_MODEL_PROVIDER: mock

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install CPU-only PyTorch
        run: |
          pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install project dependencies
        run: |
          pip install -r disha/services/ai-platform/backend/requirements.txt
          pip install -r disha/ai/core/decision_engine/requirements.txt

      - name: Run tests
        run: |
          python -m pytest disha/services/ai-platform/backend/tests/ \
            -v --tb=short -p no:cacheprovider \
            --ignore=disha/services/ai-platform/backend/tests/test_trained_models.py
      
      - name: Run trained-model tests (checkpoint-dependent)
        run: |
          python -m pytest \
            disha/services/ai-platform/backend/tests/test_trained_models.py \
            -v --tb=short -p no:cacheprovider
