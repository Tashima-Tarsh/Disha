name: AI Platform CI

on:
  push:
    branches: [main]
    paths:
      - 'disha/services/ai-platform/**'
  pull_request:
    branches: [main]
    paths:
      - 'disha/services/ai-platform/**'

permissions:
  contents: read

jobs:
  lint-python:
    name: Lint Python (AI Platform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint with ruff
        run: ruff check disha/services/ai-platform/backend/app/ --output-format=github
      - name: Format check with ruff
        run: ruff format disha/services/ai-platform/backend/app/ --check

  test-python:
    name: Test Python (AI Platform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight dependencies
        run: |
          pip install fastapi uvicorn pydantic pydantic-settings httpx pytest pytest-asyncio pytest-cov \
            "python-jose[cryptography]" "passlib[bcrypt]" python-multipart python-dotenv structlog \
            numpy pandas networkx anyio

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          cd disha/services/ai-platform/backend
          python -m pytest tests/ -v --tb=short
