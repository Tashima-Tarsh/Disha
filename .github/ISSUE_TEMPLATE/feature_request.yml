name: ✨ Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve Disha? We'd love to hear it!

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Disha would this feature improve?
      options:
        - Core CLI Engine (TypeScript/Bun)
        - AI Intelligence Platform (FastAPI/PyTorch)
        - Cyber Defense System (Honeypot/ML)
        - Historical Strategy Intelligence
        - Quantum Physics Module
        - Integrations (Cyber Intel / OSINT)
        - MCP Server
        - Docker / Deployment
        - Documentation
        - New Component
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Is your feature request related to an existing limitation?
      placeholder: I'm frustrated when… / Currently there is no way to…
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see.
      placeholder: I'd like Disha to be able to…
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches or workarounds?
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or references here.
    validations:
      required: false
