services:
  disha-web:
    build:
      context: ../web
      dockerfile: Dockerfile
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DISHA_AUTH_MODE=${DISHA_AUTH_MODE:-dev-jwt}
      - DISHA_JWT_SECRET=${DISHA_JWT_SECRET:?DISHA_JWT_SECRET must be set}
      - DISHA_DEV_PASSWORD=${DISHA_DEV_PASSWORD:-}
      - DISHA_BACKEND_URL=${DISHA_BACKEND_URL:-http://localhost:3001}
      - DISHA_WORKSPACE_ROOT=/workspace
      - DATABASE_URL=postgresql://disha:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/disha
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - ../:/workspace:rw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: disha
      POSTGRES_USER: disha
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../web/database/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U disha -d disha"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector:0.116.1
    command: ["--config=/etc/otel-collector.yml"]
    volumes:
      - ./observability/otel-collector.yml:/etc/otel-collector.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"

volumes:
  postgres-data:
  redis-data:
